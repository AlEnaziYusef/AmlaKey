<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amlakey - Your Smart Property Manager</title>
  <style>
    :root { --primary: #0284C7; --bg: #F8FAFC; --text: #1E293B; --muted: #64748B; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 20px; }
    h1 { font-size: 36px; color: var(--primary); margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 16px; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .links a { display: inline-block; padding: 12px 32px; border-radius: 12px; text-decoration: none; font-size: 15px; font-weight: 600; background: var(--primary); color: white; transition: opacity 0.2s; }
    .links a:hover { opacity: 0.85; }
    footer { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Amlakey</h1>
    <p class="subtitle">Your Smart Property Manager</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </div>
  <footer>&copy; 2026 Amlakey. All rights reserved.</footer>
</body>
</html>
